<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zoomlion Tractor Advisor · 中联重科拖拉机顾问</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-dark:   #111c0f;
      --green-mid:    #3B6D11;
      --green-light:  #4a8c2a;
      --green-pale:   #eaf3de;
      --green-muted:  #8cb870;
      --border:       #e0dbd0;
      --bg:           #f0ede6;
      --surface:      #ffffff;
      --text:         #1a2e1a;
      --text-muted:   #6a7a62;
      --sidebar-w:    238px;
    }

    html, body { height: 100%; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); }

    /* ── Layout ── */
    .app { display: flex; height: 100vh; overflow: hidden; }

    /* ── Sidebar ── */
    .sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      background: var(--green-dark);
      display: flex; flex-direction: column;
    }
    .sidebar-header { padding: 18px 16px 12px; }
    .brand-badge {
      background: var(--green-light); color: #c8e6a0;
      font-size: 10px; font-weight: 700; letter-spacing: 1.2px;
      padding: 3px 10px; border-radius: 4px; display: inline-block;
    }
    .brand-title  { color: var(--green-muted); font-size: 14px; font-weight: 600; margin-top: 8px; }
    .brand-sub    { color: #3a5a2a; font-size: 11px; margin-top: 2px; }
    .divider      { border: none; border-top: 1px solid #1e3018; margin: 0 14px; }
    .section-label {
      padding: 10px 14px 4px;
      font-size: 10px; color: #3a5a2a; letter-spacing: 1.2px;
      text-transform: uppercase; font-weight: 600;
    }
    .quick-list   { flex: 1; overflow-y: auto; padding: 2px 10px 0; }
    .quick-btn {
      display: flex; align-items: flex-start; gap: 7px;
      width: 100%; text-align: left;
      background: transparent; border: 1px solid #1e3018; border-radius: 8px;
      padding: 8px 10px; margin-bottom: 5px;
      color: #7aaa58; font-size: 12px; cursor: pointer; line-height: 1.45;
      transition: background 0.15s, color 0.15s;
    }
    .quick-btn:hover:not(:disabled) { background: #1e3018; color: #c8e6a0; }
    .quick-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .quick-icon  { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
    .sidebar-footer { padding: 10px 10px 18px; }
    .model-chips  { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; justify-content: center; }
    .chip {
      font-size: 9px; background: #1e3018; color: #5a8a3a;
      padding: 2px 6px; border-radius: 4px; font-weight: 600; letter-spacing: 0.3px;
    }
    .reset-btn {
      width: 100%; background: transparent; border: 1px solid #1e3018;
      border-radius: 7px; padding: 8px; color: #3a5a2a; font-size: 12px;
      cursor: pointer; transition: color 0.15s;
    }
    .reset-btn:hover { color: #7aaa58; }

    /* ── Main ── */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    /* Header */
    .header {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 11px 20px; display: flex; align-items: center; gap: 10px; flex-shrink: 0;
    }
    .header-avatar {
      width: 36px; height: 36px; background: var(--green-pale);
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      font-size: 19px; border: 1px solid #c8e6a0; flex-shrink: 0;
    }
    .header-title { font-weight: 700; font-size: 14px; }
    .header-sub   { font-size: 11px; color: var(--text-muted); margin-top: 1px; }

    /* Chat area */
    .chat-area {
      flex: 1; overflow-y: auto; padding: 20px 24px;
      display: flex; flex-direction: column; gap: 16px;
    }
    .msg { display: flex; align-items: flex-start; gap: 10px; }
    .msg.user { flex-direction: row-reverse; }
    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; flex-shrink: 0; margin-top: 2px;
    }
    .avatar.ai   { background: var(--green-pale); border: 1px solid #c8e6a0; }
    .avatar.user { background: #dbeafe; }
    .bubble {
      max-width: 72%; padding: 13px 17px; font-size: 13.5px; line-height: 1.75;
      word-break: break-word; white-space: pre-wrap;
      box-shadow: 0 1px 4px rgba(0,0,0,0.07);
    }
    .bubble.ai {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 4px 16px 16px 16px;
    }
    .bubble.user {
      background: var(--green-mid); color: #e8f5d8;
      border-radius: 16px 4px 16px 16px;
    }

    /* Typing dots */
    .typing { display: flex; gap: 5px; padding: 6px 0; align-items: center; }
    .dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--green-light);
      animation: bounce 1.2s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-7px); }
    }

    /* Input row */
    .input-row {
      background: var(--surface); border-top: 1px solid var(--border);
      padding: 14px 24px; display: flex; gap: 10px; align-items: flex-end; flex-shrink: 0;
    }
    textarea {
      flex: 1; padding: 10px 14px; font-size: 13.5px;
      border: 1px solid #d0ccc0; border-radius: 10px;
      font-family: inherit; resize: none; line-height: 1.55;
      background: #fafaf8; color: var(--text); outline: none;
      transition: border-color 0.15s;
    }
    textarea:focus  { border-color: var(--green-light); }
    textarea::placeholder { color: #a0a89a; }
    .send-btn {
      height: 46px; padding: 0 22px;
      background: var(--green-mid); color: #e8f5d8;
      border: none; border-radius: 10px; font-size: 20px;
      cursor: pointer; flex-shrink: 0; transition: background 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .send-btn:hover:not(:disabled) { background: #2d5209; }
    .send-btn:disabled { background: #c8d8c0; color: #8aaa80; cursor: not-allowed; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-thumb { background: #b0c8a0; border-radius: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }

    /* Error banner */
    .error-banner {
      background: #fff3cd; border: 1px solid #ffc107; color: #856404;
      padding: 10px 16px; font-size: 13px; text-align: center;
      border-radius: 8px; margin: 8px 24px 0;
    }

    @media (max-width: 600px) {
      .sidebar { width: 180px; }
      :root { --sidebar-w: 180px; }
      .bubble { max-width: 85%; }
    }
  </style>
</head>
<body>

<div class="app">

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="brand-badge">ZOOMLION</div>
      <div class="brand-title">Tractor Advisor</div>
      <div class="brand-sub">中联重科拖拉机顾问</div>
    </div>
    <hr class="divider" />
    <div class="section-label">Quick Questions</div>
    <div class="quick-list" id="quickList">
      <button class="quick-btn" onclick="quickAsk('I have a small family farm, about 50 acres. Which tractor is right for me?')">
        <span class="quick-icon">🌱</span><span>Small family farm</span>
      </button>
      <button class="quick-btn" onclick="quickAsk('I run a 500-acre grain farm doing tillage and harvesting.')">
        <span class="quick-icon">🌾</span><span>Large grain operation</span>
      </button>
      <button class="quick-btn" onclick="quickAsk('I grow rice and paddy in wet field conditions. What do you recommend?')">
        <span class="quick-icon">💧</span><span>Paddy / wet field</span>
      </button>
      <button class="quick-btn" onclick="quickAsk('I want the most fuel-efficient tractor with the lowest operating costs.')">
        <span class="quick-icon">⛽</span><span>Low fuel cost</span>
      </button>
      <button class="quick-btn" onclick="quickAsk('I need a powerful tractor for heavy equipment and pipeline transport.')">
        <span class="quick-icon">🚜</span><span>Heavy haulage</span>
      </button>
      <button class="quick-btn" onclick="quickAsk('I need a highly maneuverable tractor for orchard and vineyard work.')">
        <span class="quick-icon">🍇</span><span>Orchard / vineyard</span>
      </button>
      <button class="quick-btn" onclick="quickAsk('I am interested in precision farming technology. Do any models support GPS and automation?')">
        <span class="quick-icon">📡</span><span>Precision farming / GPS</span>
      </button>
      <button class="quick-btn" onclick="quickAsk('Can you compare all Zoomlion models? Which is best for which operation type?')">
        <span class="quick-icon">📊</span><span>Compare all models</span>
      </button>
    </div>
    <div class="sidebar-footer">
      <hr class="divider" style="margin:0 0 8px;" />
      <div class="model-chips">
        <span class="chip">RK754</span><span class="chip">RM904</span><span class="chip">RN1104</span>
        <span class="chip">PL1604</span><span class="chip">PG2004</span><span class="chip">DQ2604</span><span class="chip">DV3504</span>
      </div>
      <button class="reset-btn" onclick="resetChat()">↺ New conversation / 新对话</button>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="header">
      <div class="header-avatar">🚜</div>
      <div>
        <div class="header-title">Model Recommendation System</div>
        <div class="header-sub">型号推荐系统 · EN / 中文 bilingual responses · No account required</div>
      </div>
    </div>

    <div id="errorBanner" class="error-banner" style="display:none;"></div>

    <div class="chat-area" id="chatArea"></div>

    <div class="input-row">
      <textarea id="userInput" rows="2"
        placeholder="Describe your farm needs... / 描述您的农业需求... (Enter to send)"
        onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<script>
  const chatArea = document.getElementById('chatArea');
  const userInput = document.getElementById('userInput');
  const sendBtn  = document.getElementById('sendBtn');
  const errorBanner = document.getElementById('errorBanner');

  let history = [];
  let loading = false;

  const WELCOME = "👋 Welcome! I'm your Zoomlion tractor advisor.\n\n🇬🇧 Tell me about your farm size, crop type, budget, or tasks — I'll recommend the best Zoomlion model for you.\n\n🇨🇳 请告诉我您的农场规模、作物类型、预算或需要完成的作业——我将为您推荐最合适的中联重科拖拉机型号。\n\nUse the quick questions on the left, or type your own below.";

  function appendMsg(role, text) {
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + role;

    const av = document.createElement('div');
    av.className = 'avatar ' + role;
    av.textContent = role === 'ai' ? '🚜' : '👤';

    const bub = document.createElement('div');
    bub.className = 'bubble ' + role;
    bub.textContent = text;

    wrap.appendChild(av);
    wrap.appendChild(bub);
    chatArea.appendChild(wrap);
    chatArea.scrollTop = chatArea.scrollHeight;
    return bub;
  }

  function showTyping() {
    const wrap = document.createElement('div');
    wrap.className = 'msg ai';
    wrap.id = 'typingMsg';
    wrap.innerHTML = '<div class="avatar ai">🚜</div><div class="bubble ai"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>';
    chatArea.appendChild(wrap);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typingMsg');
    if (t) t.remove();
  }

  function setLoading(val) {
    loading = val;
    sendBtn.disabled = val;
    document.querySelectorAll('.quick-btn').forEach(b => b.disabled = val);
  }

  function showError(msg) {
    errorBanner.textContent = msg;
    errorBanner.style.display = 'block';
    setTimeout(() => { errorBanner.style.display = 'none'; }, 5000);
  }

  async function sendMessage(text) {
    const msg = text || userInput.value.trim();
    if (!msg || loading) return;
    userInput.value = '';

    appendMsg('user', msg);
    history.push({ role: 'user', content: msg });
    setLoading(true);
    showTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });

      const data = await res.json();
      removeTyping();

      if (!res.ok) {
        showError('API error: ' + (data.error || 'Unknown error'));
        history.pop();
      } else {
        appendMsg('ai', data.reply);
        history.push({ role: 'assistant', content: data.reply });
      }
    } catch (err) {
      removeTyping();
      showError('Connection error. Is the server running?');
      history.pop();
    }

    setLoading(false);
  }

  function quickAsk(q) { sendMessage(q); }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function resetChat() {
    history = [];
    chatArea.innerHTML = '';
    appendMsg('ai', WELCOME);
  }

  // Init
  appendMsg('ai', WELCOME);
</script>

</body>
</html>
